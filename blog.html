<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Indiggi — The Journal</title>
<link rel="icon" href="logo-mark.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700;9..40,800;9..40,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pp:#7B3FE4;--pk:#E0457B;--grad:linear-gradient(135deg,#7B3FE4,#E0457B);--ink:#150f26;--grey:#6b6683;--line:#eae7f3;--soft:#f7f5fc;--shadow:0 14px 34px -18px rgba(70,40,150,.2);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,Arial,sans-serif;color:var(--ink);background:#fff;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
h1,h2,h3,.dm{font-family:'DM Sans',sans-serif;font-weight:800;letter-spacing:-.6px;line-height:1.1;}
a{color:inherit;text-decoration:none;}
.wrap{max-width:1080px;margin:0 auto;padding:0 24px;}
header{border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);z-index:10;}
nav{display:flex;align-items:center;justify-content:space-between;height:66px;}
.logo{height:24px;}
.btn{font-weight:700;font-size:14px;padding:11px 18px;border-radius:26px;background:var(--grad);color:#fff;border:none;cursor:pointer;}
.hero{background:radial-gradient(120% 90% at 50% -20%,#efe9fb,#faf8fe 60%,#fff);padding:64px 0 40px;text-align:center;border-bottom:1px solid var(--line);}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--pk);}
.hero h1{font-size:46px;margin-top:12px;}
.hero p{color:var(--grey);max-width:560px;margin:14px auto 0;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:52px 0;}
.post{border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:.16s;background:#fff;}
.post:hover{transform:translateY(-4px);}
.post .th{height:180px;background-size:cover;background-position:center;background-color:var(--soft);}
.post .b{padding:22px;}
.post .k{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--pk);}
.post h3{font-size:19px;margin-top:8px;}
.post p{color:var(--grey);font-size:14px;margin-top:8px;}
.post .m{font-size:12px;color:var(--grey);margin-top:12px;}
.empty{grid-column:1/-1;text-align:center;color:var(--grey);padding:60px;}
footer{border-top:1px solid var(--line);padding:30px 0;color:var(--grey);font-size:13px;text-align:center;}
@media(max-width:820px){.grid{grid-template-columns:1fr;}.hero h1{font-size:34px;}}
</style></head><body>
<header><div class="wrap"><nav><a href="index.html"><img class="logo" src="logo.svg" alt="Indiggi"></a><a href="index.html#reserve" class="btn">Register Now</a></nav></div></header>
<section class="hero"><div class="wrap"><span class="eyebrow">The Journal</span><h1>Culture starts with a story.</h1><p>Notes from the team building Indiggi — culture, money, and the way you really live.</p></div></section>
<div class="wrap"><div class="grid" id="grid"><div class="empty">Loading…</div></div></div>
<footer><div class="wrap">© 2026 Indiggi International Holdings · Culture is the new technology</div></footer>
<script>
fetch('/api/blog').then(r=>r.json()).then(function(d){
  var posts=(d&&d.posts)||[];
  var g=document.getElementById('grid');
  if(!posts.length){ g.innerHTML='<div class="empty">No posts yet — check back soon.</div>'; return; }
  g.innerHTML=posts.map(function(p){
    var date=p.published_at?new Date(p.published_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
    var th=p.cover_url?('style="background-image:url(\''+p.cover_url+'\')"'):'style="background:linear-gradient(150deg,#5B2AAE,#E0457B)"';
    return '<a class="post" href="post.html?slug='+encodeURIComponent(p.slug)+'"><div class="th" '+th+'></div><div class="b"><span class="k">'+(esc(p.category)||'Story')+'</span><h3>'+esc(p.title)+'</h3><p>'+esc(p.excerpt||'')+'</p><div class="m">'+date+'</div></div></a>';
  }).join('');
});
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body></html>
