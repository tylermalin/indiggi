<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wallet and INCard">
  <defs>
    <linearGradient id="pk" x1="90" y1="180" x2="260" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0578F"/><stop offset="1" stop-color="#C7256B"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef0fb"/><stop offset="1" stop-color="#f7f5fc"/>
    </linearGradient>
    <linearGradient id="card" x1="70" y1="150" x2="330" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0810"/><stop offset=".45" stop-color="#171422"/><stop offset="1" stop-color="#4b4a58"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3dfad"/><stop offset="1" stop-color="#c9a15c"/>
    </linearGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#150f26" flood-opacity="0.28"/></filter>
    <clipPath id="cardClip"><rect x="40" y="150" width="320" height="200" rx="26"/></clipPath>
    <pattern id="iconpat" x="40" y="150" width="100" height="46" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#E0457B" stroke-width="1.4" opacity=".55">
        <rect x="6" y="10" width="13" height="13" transform="rotate(45 12.5 16.5)"/>
        <path d="M40,12 c-3,-5 -11,-3 -11,3 c0,6 11,13 11,13 c0,0 11,-7 11,-13 c0,-6 -8,-8 -11,-3 Z"/>
        <circle cx="66" cy="16" r="8"/>
        <path d="M58,16 h16 M66,8 c4,3 4,13 0,16 M66,8 c-4,3 -4,13 0,16"/>
        <path d="M84,10 h11 M84,15 h11 M84,20 h11"/>
        <path d="M4,36 c2,-4 8,-4 10,-1 c2,-3 8,-3 10,1 c-3,4 -6,6 -10,8 c-4,-2 -7,-4 -10,-8 Z" transform="translate(2 -4) scale(.9)"/>
      </g>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <text x="36" y="60" font-family="Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="1.5" fill="#2B2E9E">AVAILABLE BALANCE</text>
  <text x="34" y="104" font-family="'DM Sans',Arial,sans-serif" font-size="42" font-weight="800" letter-spacing="-1.5" fill="#150f26">$12,480.55</text>

  <g filter="url(#sh)">
    <rect x="40" y="150" width="320" height="200" rx="26" fill="url(#card)"/>
  </g>
  <g clip-path="url(#cardClip)">
    <rect x="40" y="150" width="320" height="200" fill="url(#iconpat)"/>
    <ellipse cx="200" cy="330" rx="220" ry="90" fill="#8a8896" opacity=".22"/>
  </g>

  <rect x="284" y="172" width="34" height="26" rx="5" fill="url(#chip)"/>
  <path d="M292,172 v26 M301,172 v26 M310,172 v26 M284,179 h34 M284,191 h34" stroke="#8a6a2c" stroke-width="1" opacity=".5"/>
  <g fill="none" stroke="#E0457B" stroke-width="3" stroke-linecap="round">
    <path d="M330,176 a14,14 0 0 1 0,20"/>
    <path d="M336,170 a22,22 0 0 1 0,32"/>
    <path d="M342,164 a30,30 0 0 1 0,44"/>
  </g>

  <g transform="translate(78,214) scale(0.86)" fill="none" stroke="url(#pk)" stroke-width="15" stroke-linecap="round" stroke-linejoin="round">
    <path d="M42,53 C39,80 42,102 57,99 C71,96 68,73 68,59 C68,48 80,46 88,54 C98,63 98,80 98,96 C99,105 108,102 115,90"/>
  </g>
  <circle cx="114" cy="240" r="10.3" fill="url(#pk)"/>

  <text x="60" y="330" font-family="'DM Sans',Arial,sans-serif" font-size="19" font-weight="700" fill="url(#pk)">founders</text>
  <text x="300" y="331" font-family="'DM Sans',Arial,sans-serif" font-size="17" font-weight="800" font-style="italic" fill="#fff">VISA</text>
